jobs:
- job: DetectChangedResxFiles
  displayName: Detect changed resx files
  timeoutInMinutes: 30
  steps:
  - checkout: self
    fetchDepth: 0

  - task: PowerShell@2
    displayName: 'Detect changed resx files'
    name: detectResxFiles
    inputs:
      targetType: inline
      script: |
        $emptyTranslationMatrix = @{ noop = @{ TranslationResxPath = ''; TranslationRelativeDirectory = ''; TranslationWorkingDirectory = '..\s'; TranslationFileName = ''; RunTranslation = 'false' } }
        $translationMatrix = @{}
        $shouldTranslate = '$(Build.Reason)' -ne 'Schedule'
        $buildReason = '$(Build.Reason)'
        $pullRequestTargetBranch = '$(System.PullRequest.TargetBranch)'

        if (-not $shouldTranslate)
        {
            Write-Host 'Resource translation is skipped for this build reason or branch.'
            Write-Host "##vso[task.setvariable variable=translationMatrix;isOutput=true]$(($emptyTranslationMatrix | ConvertTo-Json -Compress -Depth 5))"
            Write-Host '##vso[task.setvariable variable=HasResxChanges;isOutput=true]false'
            return
        }

        $changedResxFiles = @()
        $runAllResxTranslations = $false
        $diffDescription = ''

        try
        {
            if ($buildReason -eq 'PullRequest' -and -not [string]::IsNullOrWhiteSpace($pullRequestTargetBranch))
            {
                Write-Host "Detecting changed .resx files against pull request target branch '$pullRequestTargetBranch'."
                git fetch --no-tags origin $pullRequestTargetBranch 2>$null | Out-Null

                if ($LASTEXITCODE -ne 0)
                {
                    throw "Unable to fetch target branch '$pullRequestTargetBranch'."
                }

                $mergeBase = git merge-base HEAD FETCH_HEAD 2>$null

                if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($mergeBase))
                {
                    throw "Unable to determine merge base for '$pullRequestTargetBranch'."
                }

                $diffDescription = "$mergeBase..HEAD"
                $changedResxFiles = @(git diff --name-only "$mergeBase..HEAD" -- '*.resx' 2>$null |
                  Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
                  ForEach-Object { $_.Trim() -replace '\\', '/' } |
                  Sort-Object -Unique)
            }
            else
            {
                git rev-parse HEAD~1 | Out-Null

                if ($LASTEXITCODE -ne 0)
                {
                    throw 'Unable to resolve the previous commit.'
                }

                $diffDescription = 'HEAD~1..HEAD'
                $changedResxFiles = @(git diff --name-only HEAD~1 HEAD -- '*.resx' 2>$null |
                  Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
                  ForEach-Object { $_.Trim() -replace '\\', '/' } |
                  Sort-Object -Unique)
            }
        }
        catch
        {
            $runAllResxTranslations = $true
            Write-Host "Unable to determine changed .resx files. $($_.Exception.Message)"
            Write-Host 'All .resx files will be translated.'
        }

        if (-not [string]::IsNullOrWhiteSpace($diffDescription))
        {
            Write-Host "Translation diff range: $diffDescription"
        }

        if ($runAllResxTranslations)
        {
            $sourceDirectory = '$(Build.SourcesDirectory)'
            $changedResxFiles = @(Get-ChildItem -Path $sourceDirectory -Recurse -Filter '*.resx' |
              ForEach-Object { $_.FullName.Substring($sourceDirectory.Length + 1) -replace '\\', '/' } |
              Sort-Object -Unique)
        }

        if ($changedResxFiles.Count -eq 0)
        {
            Write-Host 'No changed .resx files detected.'
            Write-Host "##vso[task.setvariable variable=translationMatrix;isOutput=true]$(($emptyTranslationMatrix | ConvertTo-Json -Compress -Depth 5))"
            Write-Host '##vso[task.setvariable variable=HasResxChanges;isOutput=true]false'
            return
        }

        $index = 0

        foreach ($changedResxFile in $changedResxFiles)
        {
            $index++
            $relativeDirectory = Split-Path $changedResxFile -Parent
            $translationMatrix["resx$index"] = @{
              TranslationResxPath = $changedResxFile
              TranslationRelativeDirectory = $relativeDirectory
              TranslationWorkingDirectory = "..\\s\\$($relativeDirectory -replace '/', '\\')"
              TranslationFileName = Split-Path $changedResxFile -Leaf
              RunTranslation = 'true'
            }
        }

        Write-Host "Changed .resx files:`n$($changedResxFiles -join [Environment]::NewLine)"
        Write-Host "##vso[task.setvariable variable=translationMatrix;isOutput=true]$(($translationMatrix | ConvertTo-Json -Compress -Depth 5))"
        Write-Host '##vso[task.setvariable variable=HasResxChanges;isOutput=true]true'

- job: TranslateChangedResxFiles
  displayName: Translate changed resx files
  dependsOn: DetectChangedResxFiles
  condition: and(succeeded(), eq(dependencies.DetectChangedResxFiles.outputs['detectResxFiles.HasResxChanges'], 'true'))
  strategy:
    matrix: $[ dependencies.DetectChangedResxFiles.outputs['detectResxFiles.translationMatrix'] ]
  steps:
  - checkout: self
    fetchDepth: 1

  - task: PowerShell@2
    displayName: 'Prepare translation cache metadata'
    condition: eq(variables['RunTranslation'], 'true')
    name: prepareTranslationCache
    inputs:
      targetType: inline
      script: |
        $translationResxPath = '$(TranslationResxPath)' -replace '/', '\'
        $fullResxPath = Join-Path '$(Build.SourcesDirectory)' $translationResxPath

        if (-not (Test-Path $fullResxPath))
        {
            throw "Translation source file '$fullResxPath' was not found."
        }

        $translationSourceHash = (Get-FileHash -Path $fullResxPath -Algorithm SHA256).Hash.ToLowerInvariant()
        $translationCachePath = Join-Path (Join-Path '$(Pipeline.Workspace)' 'translation-cache') $translationSourceHash

        if (Test-Path $translationCachePath)
        {
            Remove-Item -Path $translationCachePath -Recurse -Force
        }

        New-Item -ItemType Directory -Path $translationCachePath -Force | Out-Null

        Write-Host "Translation source hash: $translationSourceHash"
        Write-Host "##vso[task.setvariable variable=TranslationSourceHash]$translationSourceHash"
        Write-Host "##vso[task.setvariable variable=TranslationCachePath]$translationCachePath"

  - task: Cache@2
    displayName: 'Restore translated resx cache'
    condition: eq(variables['RunTranslation'], 'true')
    inputs:
      key: 'resx-translation | "$(Agent.OS)" | $(TranslationResxPath) | $(TranslationSourceHash)'
      path: '$(TranslationCachePath)'
      cacheHitVar: TranslationCacheHit

  - task: PowerShell@2
    displayName: 'Restore translated resx files from cache'
    condition: and(eq(variables['RunTranslation'], 'true'), eq(variables['TranslationCacheHit'], 'true'))
    inputs:
      targetType: inline
      script: |
        $relativeDirectory = '$(TranslationRelativeDirectory)' -replace '/', '\'
        $sourceDirectory = Join-Path '$(Build.SourcesDirectory)' $relativeDirectory
        $cachedResxFiles = @(Get-ChildItem -Path '$(TranslationCachePath)' -Filter '*.resx' -File)

        if ($cachedResxFiles.Count -eq 0)
        {
            throw "No cached translated .resx files found for '$(TranslationResxPath)'."
        }

        New-Item -ItemType Directory -Path $sourceDirectory -Force | Out-Null

        foreach ($cachedResxFile in $cachedResxFiles)
        {
            Copy-Item -Path $cachedResxFile.FullName -Destination $sourceDirectory -Force
        }

        Write-Host "Restored $($cachedResxFiles.Count) translated .resx file(s) from cache."

  - task: ResourceTranslation@3
    displayName: 'ResourceTranslation - $(TranslationFileName)'
    condition: and(eq(variables['RunTranslation'], 'true'), ne(variables['TranslationCacheHit'], 'true'))
    inputs:
      C3POCustomFolder: true
      C3POWorkingFolder: '$(Build.SourcesDirectory)'
      RecursiveSearch: false
      C3POLanguages: $(C3PO_LANGUAGES_DIGITAL_APPS)
      AssemblyMaskList: '$(TranslationFileName)'
      WorkingDirectoryList: '$(TranslationWorkingDirectory)'
      C3POArguments: '-@=out.dbg -err=c3po_err.txt -s -ser -fdbjobs=all -fdbsync=incr -fdbUser=$(C3PO_TERMBASE_USER) -useenglish'
      C3PORetryCounter: '3'
      C3POTimeout: '600'
      C3PODisableCache: true

  - task: PowerShell@2
    displayName: 'Update translated resx cache'
    condition: and(succeeded(), eq(variables['RunTranslation'], 'true'), ne(variables['TranslationCacheHit'], 'true'))
    inputs:
      targetType: inline
      script: |
        $relativeDirectory = '$(TranslationRelativeDirectory)' -replace '/', '\'
        $sourceDirectory = Join-Path '$(Build.SourcesDirectory)' $relativeDirectory
        $baseFileName = [System.IO.Path]::GetFileNameWithoutExtension('$(TranslationFileName)')
        $translatedResxFiles = @(Get-ChildItem -Path $sourceDirectory -Filter "$baseFileName*.resx" -File)

        if ($translatedResxFiles.Count -eq 0)
        {
            throw "No translated .resx files found to cache for '$(TranslationResxPath)'."
        }

        Get-ChildItem -Path '$(TranslationCachePath)' -File -ErrorAction SilentlyContinue | Remove-Item -Force

        foreach ($translatedResxFile in $translatedResxFiles)
        {
            Copy-Item -Path $translatedResxFile.FullName -Destination '$(TranslationCachePath)' -Force
        }

        Write-Host "Cached $($translatedResxFiles.Count) translated .resx file(s)."

  - task: PowerShell@2
    displayName: 'Stage translated resx files'
    condition: eq(variables['RunTranslation'], 'true')
    inputs:
      targetType: inline
      script: |
        $relativeDirectory = '$(TranslationRelativeDirectory)' -replace '/', '\'
        $sourceDirectory = Join-Path '$(Build.SourcesDirectory)' $relativeDirectory
        $artifactDirectory = Join-Path '$(Build.ArtifactStagingDirectory)\translations' $relativeDirectory
        $baseFileName = [System.IO.Path]::GetFileNameWithoutExtension('$(TranslationFileName)')

        New-Item -ItemType Directory -Path $artifactDirectory -Force | Out-Null
        Get-ChildItem -Path $sourceDirectory -Filter "$baseFileName*.resx" | Copy-Item -Destination $artifactDirectory -Force

  - task: PublishPipelineArtifact@1
    displayName: 'Publish translated resx artifact'
    condition: eq(variables['RunTranslation'], 'true')
    inputs:
      targetPath: '$(Build.ArtifactStagingDirectory)\translations'
      artifact: 'translated-$(System.JobPositionInPhase)'
      publishLocation: 'pipeline'

- job: Build
  dependsOn:
  - DetectChangedResxFiles
  - TranslateChangedResxFiles
  variables:
    HasResxChanges: $[ dependencies.DetectChangedResxFiles.outputs['detectResxFiles.HasResxChanges'] ]
    TranslationFallbackRequired: 'true'
  condition: and(succeeded('DetectChangedResxFiles'), in(dependencies.TranslateChangedResxFiles.result, 'Succeeded', 'Skipped'))
  timeoutInMinutes: 240
  steps:
  - checkout: self
    fetchDepth: 1

  - download: current
    displayName: 'Download translated resx artifacts'
    condition: and(ne(variables['Build.Reason'], 'Schedule'), eq(variables['HasResxChanges'], 'true'))

  - task: PowerShell@2
    displayName: 'Merge translated resx artifacts'
    condition: and(ne(variables['Build.Reason'], 'Schedule'), eq(variables['HasResxChanges'], 'true'))
    inputs:
      targetType: inline
      script: |
        $translationArtifacts = @(Get-ChildItem -Path '$(Pipeline.Workspace)' -Directory |
          Where-Object { $_.Name -like 'translated-*' })
        $translationsMerged = $false
        $sourceRoot = '$(Build.SourcesDirectory)'

        if ($translationArtifacts.Count -eq 0)
        {
            Write-Host 'No translated resx artifacts found.'
            Write-Host '##vso[task.setvariable variable=TranslationFallbackRequired]true'
            return
        }

        foreach ($translationArtifact in $translationArtifacts)
        {
            $translationsPath = if (Test-Path (Join-Path $translationArtifact.FullName 'translations'))
            {
                Join-Path $translationArtifact.FullName 'translations'
            }
            else
            {
                $translationArtifact.FullName
            }

            if (-not (Test-Path $translationsPath))
            {
                continue
            }

            $translatedResxFiles = @(Get-ChildItem -Path $translationsPath -Recurse -Filter '*.resx' -File)

            if ($translatedResxFiles.Count -eq 0)
            {
                Write-Host "No translated .resx files found in '$translationsPath'."
                continue
            }

            Write-Host "Merging $($translatedResxFiles.Count) translated .resx file(s) from '$translationsPath'."

            foreach ($translatedResxFile in $translatedResxFiles)
            {
                $relativePath = $translatedResxFile.FullName.Substring($translationsPath.Length).TrimStart('\')
                $destinationPath = Join-Path $sourceRoot $relativePath
                $destinationDirectory = Split-Path $destinationPath -Parent

                if (-not [string]::IsNullOrWhiteSpace($destinationDirectory))
                {
                    New-Item -ItemType Directory -Path $destinationDirectory -Force | Out-Null
                }

                Copy-Item -Path $translatedResxFile.FullName -Destination $destinationPath -Force
            }

            $translationsMerged = $true
        }

        Write-Host "##vso[task.setvariable variable=TranslationFallbackRequired]$(((-not $translationsMerged).ToString()).ToLowerInvariant())"

  - task: ResourceTranslation@3
    displayName: 'ResourceTranslation fallback'
    condition: and(ne(variables['Build.Reason'], 'Schedule'), eq(variables['HasResxChanges'], 'true'), eq(variables['TranslationFallbackRequired'], 'true'))
    inputs:
      C3POCustomFolder: true
      C3POWorkingFolder: '$(Build.SourcesDirectory)'
      RecursiveSearch: true
      C3POLanguages: $(C3PO_LANGUAGES_DIGITAL_APPS)
      AssemblyMaskList: '*.resx'
      WorkingDirectoryList: '..\s'
      C3POArguments: '-@=out.dbg -err=c3po_err.txt -s -ser -fdbjobs=all -fdbsync=incr -fdbUser=$(C3PO_TERMBASE_USER) -useenglish'
      C3PORetryCounter: '3'
      C3POTimeout: '600'
      C3PODisableCache: true

  - script: |
      echo "Build branch is $(Build.SourceBranch)"
      echo "Build version tag is $(VERSION_TAG)"
    displayName: Display build branch environment variable

  - task: UseDotNet@2
    displayName: 'Use .NET Core sdk $(dotnetVersion)'
    inputs:
      packageType: 'sdk'
      version: $(dotnetVersion)

  - task: Cache@2
    displayName: Cache NuGet packages
    inputs:
      key: 'nuget | "$(Agent.OS)" | azure-pipelines.yml | **/*.csproj, !**/bin/**, !**/obj/**'
      restoreKeys: |
        nuget | "$(Agent.OS)"
      path: '$(NUGET_PACKAGES)'

  - task: DotNetCoreCLI@2
    displayName: Restore packages
    inputs:
      command: 'restore'
      arguments: '--packages $(NUGET_PACKAGES)'

  - task: SonarQubePrepare@7
    displayName: 'Prepare analysis on SonarQube'
    condition: and(succeeded(), eq(variables.disableSonarQubeAnalysis, false), eq(variables['Build.Reason'], 'PullRequest'))
    inputs:
      SonarQube: 'SonarQube Enterprise'
      projectKey: $(ProductName).$(ProjectName)
      projectName: $(ProductName).$(ProjectName)
      projectVersion: '$(MajorMinorBuildVersion)'
      extraProperties: |
          sonar.cs.vstest.reportsPaths=$(Agent.TempDirectory)/**/*.trx
          sonar.pullrequest.key=$(System.PullRequest.PullRequestNumber)
          sonar.pullrequest.branch=$(System.PullRequest.SourceBranch)
          sonar.pullrequest.base=$(System.PullRequest.TargetBranch)

  - task: SonarQubePrepare@7
    displayName: 'Prepare analysis on SonarQube'
    condition: and(succeeded(), eq(variables.disableSonarQubeAnalysis, false), ne(variables['Build.Reason'], 'PullRequest'))
    inputs:
      SonarQube: 'SonarQube Enterprise'
      projectKey: $(ProductName).$(ProjectName)
      projectName: $(ProductName).$(ProjectName)
      projectVersion: '$(MajorMinorBuildVersion)'
      extraProperties: |
        sonar.cs.vstest.reportsPaths=$(Agent.TempDirectory)/**/*.trx
        sonar.branch.name=$(Build.SourceBranchName)

  - task: DotNetCoreCLI@2
    displayName: Build projects
    timeoutInMinutes: 240
    inputs:
      command: 'build'
      projects: |
            **/*.csproj
            !**/.git/**
            !**/.github/**
            !**/.gitlab/**
            !**/logs/**
            !**/bin/**/*.csproj
            !**/obj/**/*.csproj
      arguments: '--configuration $(BuildConfiguration) /p:Version=$(VERSION_TAG) /p:PackageVersion=$(VERSION_TAG) /p:MinVerVersionOverride=$(VERSION_TAG) --no-restore -nr:FALSE'

  - task: PowerShell@2
    displayName: Run Integration Tests in PRD environment to ensure that the samples are working.
    env:
      HomagConnect:BaseUrl: $(HomagConnect:BaseUrl)
      HomagConnect:SubscriptionId: $(HomagConnect:SubscriptionId)
      HomagConnect:AuthorizationKey: $(HomagConnect:AuthorizationKey)
    inputs:
      targetType: inline
      script: |
        $testProjects = Get-ChildItem -Path '$(Build.SourcesDirectory)' -Recurse -Filter '*.Tests.csproj'
        $testResultsDirectory = '$(Agent.TempDirectory)\TestResults'
        $filter = 'TestCategory!=TemporaryDisabled&TestCategory!=UserTestInteractionNeeded'
        $maxAttempts = 3

        for ($attempt = 1; $attempt -le $maxAttempts; $attempt++)
        {
            if (Test-Path $testResultsDirectory)
            {
                Remove-Item -Path $testResultsDirectory -Recurse -Force
            }

            New-Item -ItemType Directory -Path $testResultsDirectory | Out-Null

            $hasFailures = $false

            foreach ($testProject in $testProjects)
            {
                $projectName = [System.IO.Path]::GetFileNameWithoutExtension($testProject.Name)
                $trxFileName = "$projectName-attempt$attempt.trx"

                dotnet test $testProject.FullName --configuration $(BuildConfiguration) --no-restore --no-build --logger "trx;LogFileName=$trxFileName" --results-directory "$testResultsDirectory" --filter "$filter"

                if ($LASTEXITCODE -ne 0)
                {
                    $hasFailures = $true
                }
            }

            if (-not $hasFailures)
            {
                return
            }

            if ($attempt -lt $maxAttempts)
            {
                Write-Host "Integration tests failed on attempt $attempt. Retrying with a clean test results folder."
            }
        }

        throw "Integration tests failed after $maxAttempts attempts."

  - task: PublishTestResults@2
    displayName: 'Publish test results'
    condition: and(succeededOrFailed(), ne(variables['Build.Reason'], 'Schedule'))
    inputs:
      testResultsFormat: 'VSTest'
      testResultsFiles: '$(Agent.TempDirectory)\TestResults\**\*.trx'
      failTaskOnFailedTests: true
      testRunTitle: 'HomagConnect Integration Tests'

  - task: PowerShell@2
    displayName: 'Publish HomagConnect test projects'
    condition: and(succeeded(), ne(variables['Build.Reason'], 'Schedule'))
    inputs:
      targetType: inline
      script: |
        $testProjects = Get-ChildItem -Path '$(Build.SourcesDirectory)' -Recurse -Filter '*.Tests.csproj'

        foreach ($testProject in $testProjects)
        {
            $projectName = [System.IO.Path]::GetFileNameWithoutExtension($testProject.Name)
            $outputPath = Join-Path '$(Build.ArtifactStagingDirectory)\tests' $projectName

            dotnet publish $testProject.FullName --configuration $(BuildConfiguration) --framework $(testPublishTargetFramework) --output $outputPath --no-restore --property:ErrorOnDuplicatePublishOutputFiles=false

            if ($LASTEXITCODE -ne 0)
            {
                throw "Publishing test project '$($testProject.FullName)' failed."
            }
        }

  - task: PublishPipelineArtifact@1
    displayName: 'Publish test artifacts to pipeline'
    condition: and(succeeded(), ne(variables['Build.Reason'], 'Schedule'))
    inputs:
      targetPath: '$(Build.ArtifactStagingDirectory)\tests'
      artifact: 'tests'
      publishLocation: 'pipeline'

  - task: PowerShell@2
    displayName: 'Stage NuGet packages'
    condition: and(succeeded(), ne(variables['Build.Reason'], 'Schedule'))
    inputs:
      targetType: inline
      script: |
        $packagesOutputPath = '$(Build.ArtifactStagingDirectory)\packages'
        $expectedPackageVersion = '$(VERSION_TAG)'

        if (Test-Path $packagesOutputPath)
        {
            Remove-Item -Path $packagesOutputPath -Recurse -Force
        }

        New-Item -ItemType Directory -Path $packagesOutputPath | Out-Null

        $packages = @(Get-ChildItem -Path '$(Build.SourcesDirectory)' -Recurse -Filter '*.nupkg' |
          Where-Object {
            $_.FullName -like "*\bin\$(BuildConfiguration)\*" -and
            $_.FullName -notlike '*\obj\*' -and
            $_.FullName -notlike '*\bin\*\publish\*' -and
            $_.Name -like 'HomagGroup.HomagConnect*.nupkg' -and
            $_.Name -like "*.$expectedPackageVersion.nupkg" -and
            $_.Name -notlike '*.snupkg' -and
            $_.DirectoryName -notlike '*\Tests\*' -and
            $_.Name -notlike '*.Tests*.nupkg' -and
            $_.Name -notlike '*.TestBase*.nupkg'
          })

        Write-Host "Expected package version: $expectedPackageVersion"
        Write-Host "Found $($packages.Count) NuGet package(s) to stage."

        foreach ($package in $packages)
        {
            Copy-Item -Path $package.FullName -Destination $packagesOutputPath -Force
        }

  - task: PublishPipelineArtifact@1
    displayName: 'Publish NuGet packages artifact'
    condition: and(succeeded(), ne(variables['Build.Reason'], 'Schedule'))
    inputs:
      targetPath: '$(Build.ArtifactStagingDirectory)\packages'
      artifact: 'nuget-packages'
      publishLocation: 'pipeline'

  - task: SonarQubeAnalyze@7
    displayName: 'Run Code Analysis'
    condition: and(succeeded(), eq(variables.disableSonarQubeAnalysis, false))

  - task: SonarQubePublish@7
    displayName: 'Publish Quality Gate Result'
    condition: and(succeeded(), eq(variables.disableSonarQubeAnalysis, false))

  - task: PowerShell@2
    displayName: 'Publish NuGet packages on nuget.org'
    condition: and(succeeded(), or(startsWith(variables['Build.SourceBranch'], 'refs/tags/'), startsWith(variables['Build.SourceBranch'], 'refs/heads/main')))
    inputs:
      targetType: inline
      script: |
        $packages = @(Get-ChildItem -Path '$(Build.ArtifactStagingDirectory)\packages' -Filter '*.nupkg')

        Write-Host "Found $($packages.Count) NuGet package(s) to publish."

        foreach ($package in $packages)
        {
            dotnet nuget push --source https://api.nuget.org/v3/index.json --api-key $(NUGET_API_KEY) $package.FullName --skip-duplicate

            if ($LASTEXITCODE -ne 0)
            {
                throw "Publishing package '$($package.FullName)' failed."
            }
        }
