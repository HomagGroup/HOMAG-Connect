# MEND
# resources:
#   repositories:
#   - repository: templates
#     type: git
#     name: OneHomag/SWC-DevOps-HoT
#     ref: main

trigger:
  branches:
    include:
    - main
    - 'dependabot/nuget/*'
  tags:
    include:
    - '*'

pr:
  branches:
    include:
      - '*'

variables:
  dotnetVersion: 10.0.x
  testPublishTargetFramework: net10.0
  NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages
  ProductName: HomagGroup.DigitalFactory.DigitalDevelopment
  ProjectName: HomagConnect 

  
stages:
  - stage: retrieve_version_info_from_git
    displayName: Get Version info
    jobs:
    - template: pipelines/templates/retrieve-version-info-jobs.yml

  - stage: PullRequestReview
    displayName: GitHub pull request review
    dependsOn: retrieve_version_info_from_git
    condition: and(eq(variables['Build.Reason'], 'PullRequest'), eq(variables['Build.Repository.Provider'], 'GitHub'))
    jobs:
    - job: GitHubPullRequestReview
      displayName: GitHub pull request review
      continueOnError: true
      pool:
        vmImage: 'ubuntu-latest'
      variables:
      - group: dfCopilot
      steps:
      - checkout: self
        fetchDepth: 0
        persistCredentials: false

      - task: PowerShell@2
        displayName: Run GitHub pull request review
        inputs:
          filePath: 'pipelines/scripts/review-github-pull-request.ps1'
          pwsh: true
        env:
          GITHUB_PAT: $(GITHUB-PAT)

  # MEND
  # - template: software-composition-analysis/template.yml@templates
  #   parameters:
  #     dependsOn: 
  #     - retrieve_version_info_from_git
  #     fully_qualifed_package_name: HomagGroup.DigitalFactory.Solutions.DF-Insights
  #     analyze_directory: $(Build.SourcesDirectory)
  #     package_version: $[ stageDependencies.retrieve_version_info_from_git.get_number_job.outputs['version_task.VERSION_TAG'] ]

  - stage: Build
    dependsOn:
    - retrieve_version_info_from_git
    - PullRequestReview
    condition: and(succeeded('retrieve_version_info_from_git'), in(dependencies.PullRequestReview.result, 'Succeeded', 'SucceededWithIssues', 'Skipped'))
    pool:
      #vmimage: 'windows-latest'
      name: Homag Windows Agents
    variables:
      - name: BuildConfiguration
        value: Release
      - name: VERSION_TAG
        value: $[ stageDependencies.retrieve_version_info_from_git.get_number_job.outputs['version_task.VERSION_TAG'] ]
      - group: dftranslationvariables
  
    # MEND
    # dependsOn: software_composition_analysis_stage
    jobs:
    - template: pipelines/templates/build-stage-jobs.yml
          

