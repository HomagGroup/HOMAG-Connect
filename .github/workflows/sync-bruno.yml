name: Sync Markdown to Bruno Docs

# This workflow triggers automatically whenever changes are pushed to the repository.
on:
  push:
    # Only run the workflow if Markdown files inside the API documentation folder are changed.
    paths:
      - 'Documentation/API/**/*.md'
    # Restrict this workflow to run only on these specific branches.
    branches:
      - 'feature/bruno'     

# Grant the necessary permissions for the GitHub Actions bot to push commits back to the repository.
permissions:
  contents: write

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out the repository code so the workflow can access it.
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch all history for all tags and branches. 
          # This is recommended when using auto-commit actions to avoid detached head issues.
          fetch-depth: 0 

      # Step 2: Set up the Python environment required to run our synchronization script.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Step 3: Execute the custom Python script to inject Markdown content into the .bru files.
      - name: Run Sync Script
        run: python .github/scripts/sync-bruno-docs.py

      # Step 4: Commit and push the modified .bru files back to the current branch.
      # If the Python script didn't change any files, this step will gracefully do nothing.
      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          # The commit message that will appear in your Git history.
          commit_message: "chore(bruno): auto-sync markdown documentation into .bru files"
          
          # Only stage and commit files in the Bruno directory to prevent unintended changes.
          file_pattern: 'Documentation/Bruno/**/*.bru'
          
          # Set the identity of the committer.
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
