name: Linkspector 
on: [pull_request]
jobs:
  check-links:
    name: runner / linkspector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Cache Puppeteer browsers
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/puppeteer
          key: puppeteer-cache-${{ runner.os }}-chrome
          restore-keys: puppeteer-cache-${{ runner.os }}
      
      - name: Install Chromium
        env:
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer
        run: |
          npx puppeteer browsers install chrome
          ls -la /home/runner/.cache/puppeteer/chrome-* || echo "Chrome not found after install"
      
      - name: Run linkspector
        env:
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer
        uses: umbrelladocs/action-linkspector@v1
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-review
          fail_level: any
          filter_mode: nofilter
          config_file: .github/workflows/config/linkspector.yml